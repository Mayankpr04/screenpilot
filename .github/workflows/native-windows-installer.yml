name: Build native Windows installer

on:
  workflow_dispatch:
  push:
    tags: ["native-v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
      - name: Build native application and installer
        shell: powershell
        run: .\scripts\build-native.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: ScreenPilot-Native-Windows-Installer
          path: installer-output/ScreenPilot-Setup.exe
          if-no-files-found: error

